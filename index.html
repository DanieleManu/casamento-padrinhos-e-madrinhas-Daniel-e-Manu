<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convite Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
  font-family:'Poppins', sans-serif;

  background:
  linear-gradient(rgba(3,10,25,0.80), rgba(3,10,25,0.80)),
  url('WhatsApp Image 2026-05-28 at 20.04.40.jpeg');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.convite{
  width:100%;
  max-width:900px;
  position:relative;
  overflow:hidden;

  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:45px;
  padding:75px 50px;

  text-align:center;
  color:white;

  box-shadow:
  0 25px 60px rgba(0,0,0,0.6),
  inset 0 0 25px rgba(255,255,255,0.04);
}

.linha-topo{
  width:140px;
  height:3px;
  background:#dbe7ff;
  margin:0 auto 30px;
  border-radius:20px;
}

.topo h1{
  font-family:'Great Vibes', cursive;
  font-size:88px;
  color:white;
  margin-bottom:10px;
}

.topo h2{
  font-size:30px;
  letter-spacing:5px;
  font-weight:300;
  color:#dbe7ff;
  margin-bottom:45px;
}

.foto-casal{
  width:320px;
  height:320px;
  margin:0 auto 45px;
  border-radius:35px;
  overflow:hidden;
  border:6px solid rgba(255,255,255,0.25);
}

.foto-casal img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.texto p{
  font-size:20px;
  line-height:2;
  color:#f3f3f3;
  margin-bottom:28px;
}

.data-box{
  margin:45px auto;
  width:fit-content;
  padding:22px 55px;
  border-radius:25px;
  background:linear-gradient(135deg,#001845,#003566);
  color:white;
}

.data-box p{
  font-size:38px;
  font-weight:600;
}

.cor-roupa{
  margin-top:40px;
  padding:25px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  text-align:center;
}

/* 👇 imagem menor aqui */
.imagem-traje{
  width:100%;
  max-width:320px;
  display:block;
  margin:0 auto;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.rodape{
  margin-top:45px;
}

.rodape p{
  font-size:20px;
  line-height:1.8;
  color:#f3f3f3;
  margin-bottom:15px;
}

.corações{
  font-size:30px;
  margin-bottom:20px;
}

.botao-whatsapp{
  display:inline-block;
  margin-top:35px;
  padding:18px 40px;
  border-radius:20px;
  background:linear-gradient(135deg,#25d366,#128c7e);
  color:white;
  text-decoration:none;
  font-weight:600;
}

.assinatura{
  margin-top:35px;
  font-family:'Great Vibes', cursive;
  font-size:54px;
  color:white;
}

</style>
</head>

<body>

<div class="convite">

  <div class="linha-topo"></div>

  <div class="topo">
    <h1>Convite Especial</h1>
    <h2>Padrinhos & Madrinhas</h2>
  </div>

  <!-- FOTO CASAL -->
  <div class="foto-casal">
    <img src="WhatsApp Image 2026-05-28 at 20.04.40.jpeg" alt="Casal">
  </div>

  <div class="texto">
    <p>
      Com muito amor e alegria, queremos compartilhar esse momento tão especial.
    </p>
  </div>

  <!-- DATA -->
  <div class="data-box">
    <p>23 de Agosto</p>
    <p>Cerimônia às 11h</p>
  </div>

  <!-- TRAJE (IMAGEM) -->
  <div class="cor-roupa">

    <h3>Traje dos Padrinhos</h3>

    <img
      src="WhatsApp Image 2026-06-21 at 15.56.27.jpeg"
      class="imagem-traje"
      alt="Traje dos Padrinhos"
    >

  </div>

  <!-- RODAPÉ NOVO -->
  <div class="rodape">

    <p>
      Esperamos vocês para viver esse momento único e inesquecível conosco.
    </p>

    <div class="corações">
      ✨ ❤ ✨
    </div>

    <a class="botao-whatsapp"
       href="https://wa.me/5543984420862?text=Confirmo%20minha%20presença!">
       Confirmar Presença
    </a>

    <div class="assinatura">
      Daniel & Emanuelli
    </div>

  </div>

</div>

</body>
</html>
